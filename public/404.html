<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AKURO STUDIO</title>
    <script>
      // GitHub Pages SPA redirect: stores the path in sessionStorage
      // and redirects to the root so React Router can handle it.
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search + l.hash;
    </script>
    <meta http-equiv="refresh" content="0;url=/" />
  </head>
</html>
